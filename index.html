<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0f0f0f;color:#fff;min-height:100vh;display:flex;
    align-items:center;justify-content:center;text-align:center;padding:2rem}
  h1{font-size:1.6rem;font-weight:600;margin-bottom:0.5rem}
  p{font-size:0.95rem;color:#999;margin-bottom:2rem}
  button{background:#fff;color:#0f0f0f;border:none;padding:0.8rem 2.2rem;
    border-radius:999px;font-size:1rem;font-weight:600;cursor:pointer;
    transition:opacity 0.2s}
  button:hover{opacity:0.85}
</style>
</head>
<body>
<div>
  <h1>My Links</h1>
  <p>Tap the button below to continue.</p>
  <!-- destination is not in the HTML source; assembled only on click -->
  <button onclick="go()">🔗 Visit my page</button>
</div>
<script>
  function go(){
    var c=[104,116,116,112,115,58,47,47,111,110,108,121,102,97,110,115,46,99,111,109,47,98,101,110,122,97,115,105,97,118,105,112,47,99,50,56,52];
    var u=c.map(function(n){return String.fromCharCode(n)}).join('');
    window.location.href=u;
  }
</script>
</body>
</html>
